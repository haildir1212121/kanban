<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fleet Repair Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <link href="./styles.base.css" rel="stylesheet">
  <link href="./styles.elements.css" rel="stylesheet">
  <link href="./styles.header.css" rel="stylesheet">
  <link href="./styles.lanes.css" rel="stylesheet">
  <link href="./styles.task.css" rel="stylesheet">
  <link href="./styles.progress.css" rel="stylesheet">
  <link href="./styles.theme.css" rel="stylesheet">
  <link href="./styles.fleet.css" rel="stylesheet">

</head>
<body class="theme-coronary-dream">
  <main>
    <header class="header fleet-header">
      <div class="fleet-title">
        <h1>Fleet Repair Tracker</h1>
        <span class="fleet-clock" id="fleet-clock"></span>
      </div>

      <div class="fleet-stats" id="fleet-stats">
        <div class="fleet-stat">
          <span class="fleet-stat__value" id="stat-active">0</span>
          <span class="fleet-stat__label">Active</span>
        </div>
        <div class="fleet-stat fleet-stat--attention">
          <span class="fleet-stat__value" id="stat-urgent">0</span>
          <span class="fleet-stat__label">Urgent</span>
        </div>
        <div class="fleet-stat fleet-stat--positive">
          <span class="fleet-stat__value" id="stat-done-today">0</span>
          <span class="fleet-stat__label">Done Today</span>
        </div>
      </div>

      <div class="header-actions">
        <button class="btn btn--primary" id="add-ticket-btn">
          + New Ticket
        </button>

        <a href="#" class="action" id="theme-toggle">
          <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path class="theme theme-1"
              d="M9.5 14C11.9853 14 14 11.9853 14 9.5C14 7.01472 11.9853 5 9.5 5C7.01472 5 5 7.01472 5 9.5C5 11.9853 7.01472 14 9.5 14Z"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            <path class="theme theme-2"
              d="M22.5 14C24.9853 14 27 11.9853 27 9.5C27 7.01472 24.9853 5 22.5 5C20.0147 5 18 7.01472 18 9.5C18 11.9853 20.0147 14 22.5 14Z"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            <path class="theme theme-4"
              d="M9.5 27C11.9853 27 14 24.9853 14 22.5C14 20.0147 11.9853 18 9.5 18C7.01472 18 5 20.0147 5 22.5C5 24.9853 7.01472 27 9.5 27Z"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            <path class="theme theme-3"
              d="M22.5 27C24.9853 27 27 24.9853 27 22.5C27 20.0147 24.9853 18 22.5 18C20.0147 18 18 20.0147 18 22.5C18 24.9853 20.0147 27 22.5 27Z"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </a>
      </div>
    </header>

    <div class="lanes fleet-lanes" id="board">
      <!-- Columns rendered by JS -->
    </div>
  </main>

  <!-- New Ticket / Edit Ticket Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="ticket-modal">
      <header class="modal__header">
        <h2 id="modal-title">New Repair Ticket</h2>
        <button class="modal__close" id="modal-close">&times;</button>
      </header>
      <form class="modal__form" id="ticket-form">
        <div class="form-row form-row--half">
          <div class="form-group">
            <label for="vehicle-number">Vehicle #</label>
            <input type="text" id="vehicle-number" name="vehicleNumber" placeholder="e.g. 4501" required>
          </div>
          <div class="form-group">
            <label for="vehicle-name">Vehicle Name / Description</label>
            <input type="text" id="vehicle-name" name="vehicleName" placeholder="e.g. 2019 Freightliner Cascadia">
          </div>
        </div>

        <div class="form-row form-row--half">
          <div class="form-group">
            <label for="ticket-priority">Priority</label>
            <select id="ticket-priority" name="priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
          <div class="form-group">
            <label for="ticket-assignee">Assigned Mechanic</label>
            <input type="text" id="ticket-assignee" name="assignee" placeholder="e.g. Mike S.">
          </div>
        </div>

        <div class="form-group">
          <label for="repair-type">Repair Type</label>
          <select id="repair-type" name="repairType">
            <option value="engine">Engine</option>
            <option value="transmission">Transmission</option>
            <option value="brakes">Brakes</option>
            <option value="electrical">Electrical</option>
            <option value="hvac">HVAC</option>
            <option value="tires">Tires / Wheels</option>
            <option value="suspension">Suspension</option>
            <option value="body">Body / Paint</option>
            <option value="oil-change">Oil Change / PM</option>
            <option value="inspection">Inspection</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="ticket-description">Issue Description</label>
          <textarea id="ticket-description" name="description" rows="3" placeholder="Describe the issue..."></textarea>
        </div>

        <div class="form-row form-row--half">
          <div class="form-group">
            <label for="estimated-hours">Estimated Hours</label>
            <input type="number" id="estimated-hours" name="estimatedHours" min="0" step="0.5" placeholder="0">
          </div>
          <div class="form-group">
            <label for="mileage">Mileage</label>
            <input type="text" id="mileage" name="mileage" placeholder="e.g. 125,000">
          </div>
        </div>

        <input type="hidden" id="ticket-id" name="id">
        <input type="hidden" id="ticket-column" name="column" value="incoming">

        <div class="form-actions">
          <button type="button" class="btn btn--ghost" id="modal-cancel">Cancel</button>
          <button type="button" class="btn btn--danger" id="modal-delete" style="display:none;">Delete</button>
          <button type="submit" class="btn btn--primary">Save Ticket</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
